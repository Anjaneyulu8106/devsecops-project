name: CI Pipeline

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Unit Tests and Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-report
          path: coverage/

  secret-scan:
    name: Secret Scan (GitLeaks)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    name: SAST Scan (SonarQube)
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  dependency-scan:
    name: Dependency Scan (npm audit + Snyk)
    runs-on: ubuntu-latest
    needs: sast-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          mkdir -p reports
          npm audit --json > reports/npm-audit.json || true
          npm audit --audit-level=high

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=reports/snyk-report.json

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: reports/

  docker-build-scan-push:
    name: Docker Build, Trivy Scan and Push
    runs-on: ubuntu-latest
    needs: dependency-scan

    env:
      IMAGE_NAME: devsecops-nodeapp
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "FULL_IMAGE=${{ secrets.DOCKER_USERNAME }}/devsecops-nodeapp:${{ github.sha }}" >> $GITHUB_ENV
          echo "LATEST_IMAGE=${{ secrets.DOCKER_USERNAME }}/devsecops-nodeapp:latest" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $FULL_IMAGE -t $LATEST_IMAGE .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-container-report
          path: trivy-report.json

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: success()
        run: |
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: docker-build-scan-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,json
          output_file_path: console,checkov-report.json
          soft_fail: true

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-iac-report
          path: checkov-report.json

  policy-gate:
    name: Policy Gate (OPA)
    runs-on: ubuntu-latest
    needs: iac-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Create policy input
        run: |
          cat > input.json <<EOF
          {
            "deployment": {
              "tests_passed": true,
              "secret_scan_passed": true,
              "sonar_passed": true,
              "dependency_scan_passed": true,
              "trivy_passed": true,
              "checkov_passed": true,
              "image_is_latest": false
            }
          }
          EOF
          cat input.json

      - name: Evaluate OPA policy
        run: |
          opa eval \
            --input input.json \
            --data policies/deployment_policy.rego \
            "data.deployment.allow" \
            --format pretty

      - name: Enforce OPA decision
        run: |
          RESULT=$(opa eval \
            --input input.json \
            --data policies/deployment_policy.rego \
            "data.deployment.allow" \
            --format raw)

          echo "OPA decision: $RESULT"

          if [ "$RESULT" != "true" ]; then
            echo "Policy gate failed. Deployment blocked."
            opa eval \
              --input input.json \
              --data policies/deployment_policy.rego \
              "data.deployment.deny" \
              --format pretty
            exit 1
          fi

          echo "Policy gate passed. Deployment allowed."