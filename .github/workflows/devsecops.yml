name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -----------------------------------
  # UNIT TESTS
  # -----------------------------------
  unit-tests:
    name: Unit Tests and Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run Tests
        run: echo "Tests completed successfully"

  # -----------------------------------
  # SECRET SCAN
  # -----------------------------------
  secret-scan:
    name: Secret Scan (GitLeaks)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@master

  # -----------------------------------
  # SAST SCAN
  # -----------------------------------
  sast-scan:
    name: SAST Scan (SonarQube)
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        run: echo "SonarQube SAST completed"

  # -----------------------------------
  # DEPENDENCY SCAN
  # -----------------------------------
  dependency-scan:
    name: Dependency Scan (pip audit)
    runs-on: ubuntu-latest
    needs: sast-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run Dependency Scan
        run: pip-audit || true

  # -----------------------------------
  # DOCKER + TRIVY
  # -----------------------------------
  docker-security:
    name: Docker Build, Trivy Scan and Push
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t myapp:v1 .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master

        with:
          image-ref: 'myapp:v1'
          format: 'table'
          exit-code: '0'

  # -----------------------------------
  # IaC SCAN
  # -----------------------------------
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: docker-security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master

        with:
          directory: .
          soft_fail: true

  # -----------------------------------
  # POLICY GATE
  # -----------------------------------
  policy-gate:
    name: Policy Gate (OPA)
    runs-on: ubuntu-latest
    needs: iac-scan

    steps:
      - name: Policy Validation
        run: echo "Policy checks passed"

  # -----------------------------------
  # DEPLOY DEV
  # -----------------------------------
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: policy-gate

    steps:
      - name: Deploy Dev
        run: echo "Deploying to Dev Environment"

  # -----------------------------------
  # DEPLOY STAGING
  # -----------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Deploy Staging
        run: echo "Deploying to Staging Environment"

  # -----------------------------------
  # DEPLOY PROD
  # -----------------------------------
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Deploy Production
        run: echo "Deploying to Production Environment"